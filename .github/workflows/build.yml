name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync dist to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
        run: |
          set -euo pipefail
          EC2_DEPLOY_PATH="$(printf '%s' "$EC2_DEPLOY_PATH" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "$EC2_DEPLOY_PATH" ]; then
            echo "::error::EC2_DEPLOY_PATH is empty. Without it, rsync targets / and fails with Receiver mkdir Permission denied."
            exit 1
          fi
          case "$EC2_DEPLOY_PATH" in
            /*) ;;
            *)
              echo "::error::EC2_DEPLOY_PATH must be an absolute path (e.g. /var/www/thamjiththaha.com), not a relative path."
              exit 1
              ;;
          esac
          PORT="${EC2_SSH_PORT:-22}"
          DEST="${EC2_DEPLOY_PATH%/}/"
          rsync -avz --delete -e "ssh -p ${PORT}" dist/ "${EC2_USER}@${EC2_HOST}:${DEST}"
