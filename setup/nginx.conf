# TLS: obtain certificates before enabling the HTTPS server block (paths below must exist).
# Example:
#   sudo certbot --nginx -d thamjiththaha.com -d www.thamjiththaha.com
#
# Warning: do not blindly overwrite /etc/nginx/sites-available/thamjiththaha.com on a live
# server with this file without merging—Certbot or manual edits may differ, and SSL or
# redirect settings can be lost.

server {
    listen 80;
    listen [::]:80;
    server_name thamjiththaha.com www.thamjiththaha.com;

    root /var/www/thamjiththaha.com;
    index index.html;

    # Vite copies everything under `public/` to the site root (same paths as in `dist/`).
    # Built bundles live under `/assets/`. Serve these as real files only — never SPA fallback.
    # `location = /terminal/index.txt` below still wins over this regex for that exact URL.
    location ~* \.(?:pdf|docx|png|jpe?g|gif|webp|svg|ico|txt|woff2?|ttf|xml|json|webmanifest|js|mjs|css|map)$ {
        try_files $uri =404;
    }

    location / {
        if ($http_user_agent ~* "(curl|wget|httpie|python-requests|go-http-client|lynx)") {
            rewrite ^ /terminal/index.txt last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /terminal/index.txt {
        default_type text/plain;
        charset utf-8;
        if ($http_user_agent !~* "(curl|wget|httpie|python-requests|go-http-client|lynx)") {
            return 302 /;
        }
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name thamjiththaha.com www.thamjiththaha.com;

    ssl_certificate /etc/letsencrypt/live/thamjiththaha.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thamjiththaha.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/thamjiththaha.com;
    index index.html;

    # Vite copies everything under `public/` to the site root (same paths as in `dist/`).
    # Built bundles live under `/assets/`. Serve these as real files only — never SPA fallback.
    # `location = /terminal/index.txt` below still wins over this regex for that exact URL.
    location ~* \.(?:pdf|docx|png|jpe?g|gif|webp|svg|ico|txt|woff2?|ttf|xml|json|webmanifest|js|mjs|css|map)$ {
        try_files $uri =404;
    }

    location / {
        if ($http_user_agent ~* "(curl|wget|httpie|python-requests|go-http-client|lynx)") {
            rewrite ^ /terminal/index.txt last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /terminal/index.txt {
        default_type text/plain;
        charset utf-8;
        if ($http_user_agent !~* "(curl|wget|httpie|python-requests|go-http-client|lynx)") {
            return 302 /;
        }
    }
}
